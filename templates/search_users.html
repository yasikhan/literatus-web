{% extends "layout.html" %}

{% block title %}Find Readers — Literatus{% endblock %}

{% block content %}
<div class="search-users-page">
    <h2 class="annotation-label">find readers</h2>

    <form action="{{ url_for('search_users') }}" method="get" class="search-form">
        <input type="text" name="query" value="{{ query or '' }}" placeholder="search by username..." class="form-input">
        <button type="submit">search</button>
    </form>

    {% if users %}
        <ul class="user-results">
        {% for user in users %}
            <li>
                <a href="{{ url_for('profile', username=user.username) }}">{{ user.username }}</a>
            </li>
        {% endfor %}
        </ul>
    {% elif query %}
        <p class="empty-shelf">no readers found</p>
    {% endif %}
</div>
{% endblock %}
