{% extends "layout.html" %}

{% block title %}Rerank Book — Literatus{% endblock %}

{% block content %}
<div class="comparison-page">
    <h1 class="comparison-prompt">which do you prefer now?</h1>

    <div class="comparison-cards">
        <div class="comparison-card">
            <form action="{{ url_for('rerank_book') }}" method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <input type="hidden" name="compared_book_id" value="{{ compared_book.id }}">
                <input type="hidden" name="preference" value="1">
                <button type="submit">
                    <div class="book-title">{{ book_to_rerank.title }}</div>
                    <div class="book-author">{{ book_to_rerank.author }}</div>
                </button>
            </form>
        </div>

        <span class="comparison-vs">vs</span>

        <div class="comparison-card">
            <form action="{{ url_for('rerank_book') }}" method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <input type="hidden" name="compared_book_id" value="{{ compared_book.id }}">
                <input type="hidden" name="preference" value="0">
                <button type="submit">
                    <div class="book-title">{{ compared_book.title }}</div>
                    <div class="book-author">{{ compared_book.author }}</div>
                </button>
            </form>
        </div>
    </div>

    <p class="comparison-hint">click the book you prefer to continue reranking</p>
    <a href="{{ url_for('profile', username=current_user.username) }}" class="comparison-cancel">cancel and return to profile</a>
</div>
{% endblock %}
