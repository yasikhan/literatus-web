{% extends "layout.html" %}

{% block title %}Compare Books — Literatus{% endblock %}

{% block content %}
<div class="comparison-page">
    <h1 class="comparison-prompt">which do you prefer?</h1>

    <div class="comparison-cards">
        <div class="comparison-card">
            <form action="{{ url_for('compare_books') }}" method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <input type="hidden" name="compared_book_id" value="{{ compared_book.id }}">
                <input type="hidden" name="preference" value="1">
                <button type="submit">
                    <div class="book-title">{{ new_book.title }}</div>
                    <div class="book-author">{{ new_book.author }}</div>
                </button>
            </form>
        </div>

        <span class="comparison-vs">vs</span>

        <div class="comparison-card">
            <form action="{{ url_for('compare_books') }}" method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <input type="hidden" name="compared_book_id" value="{{ compared_book.id }}">
                <input type="hidden" name="preference" value="0">
                <button type="submit">
                    <div class="book-title">{{ compared_book.title }}</div>
                    <div class="book-author">{{ compared_book.author }}</div>
                </button>
            </form>
        </div>
    </div>

    <p class="comparison-hint">click the book you prefer to continue ranking</p>
</div>
{% endblock %}
