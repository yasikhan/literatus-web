{% extends "layout.html" %}

{% block title %}Register — Literatus{% endblock %}

{% block content %}
<div class="notebook-container">
    <h1>register</h1>
    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        <div class="form-group">
            <label for="username" class="form-label">username</label>
            <input type="text" id="username" name="username" required minlength="3" maxlength="80" class="form-input">
        </div>
        <div class="form-group">
            <label for="password" class="form-label">password (8+ characters)</label>
            <input type="password" id="password" name="password" required minlength="8" class="form-input">
        </div>
        <button type="submit" class="form-submit">join</button>
    </form>
    <p class="form-link">already have an account? <a href="{{ url_for('login') }}">login here</a></p>
</div>
{% endblock %}
